name: Build Docker Images

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          # Debian Trixie ARM64
          - debian_version: trixie
            php_version: "8.5"
            platform: linux/arm64
            tags_suffix: php8.5-trixie-arm64
            runner: ubuntu-24.04-arm
          - debian_version: trixie
            php_version: "8.4"
            platform: linux/arm64
            tags_suffix: php8.4-trixie-arm64
            runner: ubuntu-24.04-arm
          - debian_version: trixie
            php_version: "8.3"
            platform: linux/arm64
            tags_suffix: php8.3-trixie-arm64
            runner: ubuntu-24.04-arm
          - debian_version: trixie
            php_version: "8.2"
            platform: linux/arm64
            tags_suffix: php8.2-trixie-arm64
            runner: ubuntu-24.04-arm

          # Debian Trixie AMD64
          - debian_version: trixie
            php_version: "8.5"
            platform: linux/amd64
            tags_suffix: php8.5-trixie-amd64
            runner: ubuntu-latest
          - debian_version: trixie
            php_version: "8.4"
            platform: linux/amd64
            tags_suffix: php8.4-trixie-amd64
            runner: ubuntu-latest
            is_test_build: true  # Mark this as the test build for PRs
          - debian_version: trixie
            php_version: "8.3"
            platform: linux/amd64
            tags_suffix: php8.3-trixie-amd64
            runner: ubuntu-latest
          - debian_version: trixie
            php_version: "8.2"
            platform: linux/amd64
            tags_suffix: php8.2-trixie-amd64
            runner: ubuntu-latest

          # Debian Bookworm ARM v7
          - debian_version: bookworm
            php_version: "8.5"
            platform: linux/arm/v7
            tags_suffix: php8.5-bookworm-armv7
            runner: ubuntu-24.04-arm
          - debian_version: bookworm
            php_version: "8.4"
            platform: linux/arm/v7
            tags_suffix: php8.4-bookworm-armv7
            runner: ubuntu-24.04-arm
          - debian_version: bookworm
            php_version: "8.3"
            platform: linux/arm/v7
            tags_suffix: php8.3-bookworm-armv7
            runner: ubuntu-24.04-arm
          - debian_version: bookworm
            php_version: "8.2"
            platform: linux/arm/v7
            tags_suffix: php8.2-bookworm-armv7
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ matrix.tags_suffix }}
            type=raw,value=${{ matrix.tags_suffix }}-{{sha}}

      - name: Build and push Docker image
        # On PRs, only build the test image; on main, build all
        if: github.event_name != 'pull_request' || matrix.is_test_build == true
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            PHP_VERSION=${{ matrix.php_version }}
            DEBIAN_VERSION=${{ matrix.debian_version }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-manifests:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        php_version: ["8.5", "8.4", "8.3", "8.2"]

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest for PHP ${{ matrix.php_version }}
        run: |
          docker buildx imagetools create -t ghcr.io/${{ github.repository }}:php${{ matrix.php_version }} \
            ghcr.io/${{ github.repository }}:php${{ matrix.php_version }}-trixie-arm64 \
            ghcr.io/${{ github.repository }}:php${{ matrix.php_version }}-trixie-amd64 \
            ghcr.io/${{ github.repository }}:php${{ matrix.php_version }}-bookworm-armv7
