name: Build Docker Images

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          # Debian Trixie ARM64
          - debian_version: trixie
            php_version: "8.5"
            platform: linux/arm64
            tags_suffix: php8.5-trixie-arm64
          - debian_version: trixie
            php_version: "8.4"
            platform: linux/arm64
            tags_suffix: php8.4-trixie-arm64
          - debian_version: trixie
            php_version: "8.3"
            platform: linux/arm64
            tags_suffix: php8.3-trixie-arm64
          - debian_version: trixie
            php_version: "8.2"
            platform: linux/arm64
            tags_suffix: php8.2-trixie-arm64

          # Debian Trixie AMD64
          - debian_version: trixie
            php_version: "8.5"
            platform: linux/amd64
            tags_suffix: php8.5-trixie-amd64
          - debian_version: trixie
            php_version: "8.4"
            platform: linux/amd64
            tags_suffix: php8.4-trixie-amd64
          - debian_version: trixie
            php_version: "8.3"
            platform: linux/amd64
            tags_suffix: php8.3-trixie-amd64
          - debian_version: trixie
            php_version: "8.2"
            platform: linux/amd64
            tags_suffix: php8.2-trixie-amd64

          # Debian Bookworm ARM v7
          - debian_version: bookworm
            php_version: "8.5"
            platform: linux/arm/v7
            tags_suffix: php8.5-bookworm-armv7
          - debian_version: bookworm
            php_version: "8.4"
            platform: linux/arm/v7
            tags_suffix: php8.4-bookworm-armv7
          - debian_version: bookworm
            php_version: "8.3"
            platform: linux/arm/v7
            tags_suffix: php8.3-bookworm-armv7
          - debian_version: bookworm
            php_version: "8.2"
            platform: linux/arm/v7
            tags_suffix: php8.2-bookworm-armv7

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ matrix.tags_suffix }}
            type=raw,value=${{ matrix.tags_suffix }}-{{sha}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            PHP_VERSION=${{ matrix.php_version }}
            DEBIAN_VERSION=${{ matrix.debian_version }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
